<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyNest | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #CCEAFF 0%, #E8F5FF 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* Abstract Background Circles */
        .bg-circle { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.4); z-index: 1; }
        .c1 { width: 300px; height: 300px; right: -50px; bottom: -50px; }
        .c2 { width: 200px; height: 200px; right: 150px; bottom: 100px; }
        .c3 { width: 400px; height: 400px; right: -100px; top: -100px; }

        .auth-wrapper {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 50px; width: 100%; max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); z-index: 10; position: relative;
        }

        .header-text { color: #10143E; margin-bottom: 30px; }
        .header-text h1 { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 600; margin-bottom: 5px; letter-spacing: -1px;}
        .header-text p { font-size: 16px; color: #333; }

        /* Navigation Pills */
        .nav-text { font-size: 14px; color: #10143E; margin-bottom: 15px; font-weight: 600;}
        .pill-container { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        
        .pill-btn {
            background: transparent; border: 1.5px solid #10143E; color: #10143E; 
            padding: 10px 24px; border-radius: 30px; font-size: 15px; font-weight: 600; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .pill-btn:hover, .pill-btn.active { background: #10143E; color: white; }
        .chevron { font-weight: bold; font-size: 18px; line-height: 1;}

        /* Forms */
        .form-section { display: none; animation: fadeIn 0.4s ease; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 20px; }
        .input-group input { 
            width: 100%; padding: 15px; border: 1px solid #ccc; 
            border-radius: 12px; font-size: 15px; outline: none; transition: 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .input-group input:focus { border-color: #10143E; box-shadow: 0 0 0 3px rgba(16,20,62,0.1); }

        /* --- THE LOADING SPINNER CSS --- */
        .submit-btn {
            width: 100%; background: #10143E; color: white;
            border: none; padding: 15px; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; 
            transition: 0.3s; position: relative;
        }
        .submit-btn:hover { background: #1A2266; transform: translateY(-2px); }
        
        /* When the 'loading' class is added via JS */
        .submit-btn.loading { color: transparent !important; pointer-events: none; }
        .submit-btn.loading::after {
            content: ""; position: absolute;
            width: 22px; height: 22px;
            top: 0; left: 0; right: 0; bottom: 0; margin: auto;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .message { margin-top: 15px; font-size: 14px; font-weight: 600; text-align: center; }
        .error { color: #d83a3a; } .success { color: #2d7a2d; }
        #otp-input-area { display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="bg-circle c1"></div><div class="bg-circle c2"></div><div class="bg-circle c3"></div>

    <div class="auth-wrapper">
        <div class="header-text">
            <h1>Hello there,</h1>
            <p>Log in to save up to 10% on your bookings.</p>
        </div>

        <div class="nav-text">Log in as:</div>
        <div class="pill-container">
            <button class="pill-btn active" onclick="switchTab('phone')">Phone (OTP) <span class="chevron">›</span></button>
            <button class="pill-btn" onclick="switchTab('email')">Email <span class="chevron">›</span></button>
            <button class="pill-btn" onclick="switchTab('register')">New User <span class="chevron">›</span></button>
        </div>

        <div id="phone-section" class="form-section active">
            <div class="input-group">
                <input type="text" id="login-phone" placeholder="Enter Phone Number (e.g., 9876543210)">
            </div>
            <button class="submit-btn" id="send-otp-btn" onclick="sendOTP()">Send OTP</button>
            
            <div id="otp-input-area">
                <div class="input-group">
                    <input type="text" id="login-otp" placeholder="Enter 6-digit OTP from terminal">
                </div>
                <button class="submit-btn" id="verify-otp-btn" onclick="verifyOTP()">Verify & Login</button>
            </div>
            <div id="phone-msg" class="message"></div>
        </div>

        <div id="email-section" class="form-section">
            <form id="emailForm">
                <div class="input-group"><input type="email" id="login-email" required placeholder="Email Address"></div>
                <div class="input-group"><input type="password" id="login-password" required placeholder="Password"></div>
                <button type="submit" class="submit-btn" id="email-login-btn">Login Securely</button>
            </form>
            <div id="email-msg" class="message"></div>
        </div>

        <div id="register-section" class="form-section">
            <form id="registerForm">
                <div class="input-group"><input type="text" id="reg-name" required placeholder="Full Name"></div>
                <div class="input-group"><input type="email" id="reg-email" required placeholder="Email Address"></div>
                <div class="input-group"><input type="text" id="reg-phone" required placeholder="Phone Number"></div>
                <div class="input-group"><input type="password" id="reg-password" required placeholder="Create Password"></div>
                <button type="submit" class="submit-btn" id="reg-btn">Create Account</button>
            </form>
            <div id="reg-msg" class="message"></div>
        </div>

    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.pill-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(tab + '-section').classList.add('active');
        }

        // --- OTP LOGIC ---
        function sendOTP() {
            const phone = document.getElementById('login-phone').value;
            const msgBox = document.getElementById('phone-msg');
            const btn = document.getElementById('send-otp-btn');
            
            // 1. Start Loading Spinner
            btn.classList.add('loading');
            msgBox.className = 'message'; msgBox.innerText = '';

            fetch('/api/send_otp', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone })
            }).then(res => res.json()).then(data => {
                // 2. Stop Loading Spinner
                btn.classList.remove('loading');
                msgBox.innerText = data.message;
                
                if(data.success) {
                    msgBox.classList.add('success');
                    btn.style.display = 'none';
                    document.getElementById('otp-input-area').style.display = 'block';
                } else { msgBox.classList.add('error'); }
            }).catch(() => { btn.classList.remove('loading'); });
        }

        function verifyOTP() {
            const phone = document.getElementById('login-phone').value;
            const otp = document.getElementById('login-otp').value;
            const msgBox = document.getElementById('phone-msg');
            const btn = document.getElementById('verify-otp-btn');

            btn.classList.add('loading');

            fetch('/api/verify_otp', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone, otp: otp })
            }).then(res => res.json()).then(data => {
                msgBox.innerText = data.message;
                if(data.success) {
                    msgBox.className = 'message success';
                    setTimeout(() => window.location.href = data.redirect, 1000);
                    // We intentionally leave it spinning while redirecting!
                } else { 
                    btn.classList.remove('loading');
                    msgBox.className = 'message error'; 
                }
            }).catch(() => { btn.classList.remove('loading'); });
        }

        // --- EMAIL LOGIC ---
        document.getElementById('emailForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const msgBox = document.getElementById('email-msg');
            const btn = document.getElementById('email-login-btn');
            
            btn.classList.add('loading');

            fetch('/api/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('login-email').value,
                    password: document.getElementById('login-password').value
                })
            }).then(res => res.json()).then(data => {
                msgBox.innerText = data.message;
                if(data.success) { 
                    setTimeout(() => window.location.href = data.redirect, 1000); 
                } else { 
                    btn.classList.remove('loading');
                    msgBox.className = 'message error'; 
                }
            }).catch(() => { btn.classList.remove('loading'); });
        });

        // --- REGISTER LOGIC ---
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const msgBox = document.getElementById('reg-msg');
            const btn = document.getElementById('reg-btn');

            btn.classList.add('loading');

            fetch('/api/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('reg-name').value,
                    email: document.getElementById('reg-email').value,
                    phone: document.getElementById('reg-phone').value,
                    password: document.getElementById('reg-password').value
                })
            }).then(res => res.json()).then(data => {
                btn.classList.remove('loading');
                msgBox.innerText = data.message;
                if(data.success) { 
                    msgBox.className = 'message success'; 
                    document.getElementById('registerForm').reset();
                } else { msgBox.className = 'message error'; }
            }).catch(() => { btn.classList.remove('loading'); });
        });
    </script>
</body>
</html>
